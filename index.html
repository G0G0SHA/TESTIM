<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестовая форма</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background-color: #f4f4f9; }
        .form-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 300px; }
        input { display: block; width: 100%; margin-bottom: 15px; padding: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 4px; }
        button:hover { background: #0056b3; }
        #message { margin-top: 15px; color: green; font-weight: bold; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2 id="header">Форма связи</h2>
        <form id="feedback-form" onsubmit="event.preventDefault(); document.getElementById('message').innerText = 'Успешно отправлено!';">
            <input type="text" id="name" placeholder="Имя" required>
            <input type="email" id="email" placeholder="Email" required>
            <button type="submit" id="submit-btn">Отправить</button>
        </form>
        <p id="message"></p>
    </div>

</body>
</html>
